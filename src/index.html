<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fraud Prevention Console</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Display: Bricolage Grotesque · Body: IBM Plex Sans · Numerics/IDs: IBM Plex Mono.
       Loaded non-render-blocking (print → all on load); font-display:swap shows
       fallback text immediately, so fonts never delay first paint. -->
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    media="print"
    onload="this.media='all'">
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/icon?family=Material+Icons"
    media="print"
    onload="this.media='all'">
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  </noscript>
</head>
<body>
  <app-root></app-root>
</body>
</html>
