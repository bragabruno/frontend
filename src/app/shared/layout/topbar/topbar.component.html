<mat-toolbar class="topbar">
  <button mat-icon-button (click)="toggleSidenav.emit()" aria-label="Toggle navigation" class="menu-btn">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="search-container">
    <mat-icon class="search-icon">search</mat-icon>
    <input
      class="search-input"
      type="text"
      placeholder="Search..."
      [ngModel]="searchQuery()"
      (ngModelChange)="searchQuery.set($event)"
    />
  </div>

  <span class="spacer"></span>

  <div class="topbar-actions">
    <button mat-icon-button aria-label="Notifications" class="action-btn">
      <mat-icon [matBadge]="0" matBadgeColor="warn" [matBadgeHidden]="true">notifications</mat-icon>
    </button>

    <button mat-icon-button aria-label="Settings" class="action-btn">
      <mat-icon>settings</mat-icon>
    </button>
  </div>

  <div class="topbar-divider"></div>

  <div class="user-menu" *ngIf="user() as u">
    <button mat-button [matMenuTriggerFor]="userMenu" class="user-button">
      <div class="user-avatar">{{ initials }}</div>
      <div class="user-info">
        <span class="username">{{ u.username }}</span>
        <span class="role-badge">{{ roleBadge }}</span>
      </div>
      <mat-icon class="dropdown-icon">expand_more</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu" class="user-dropdown">
      <button mat-menu-item>
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </button>
      <button mat-menu-item>
        <mat-icon>help_outline</mat-icon>
        <span>Help</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span>Sign out</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
