<div class="topbar">
  <button
    nbButton
    ghost
    type="button"
    class="icon-btn menu-btn"
    (click)="toggleSidenav.emit()"
    aria-label="Toggle navigation"
  >
    <nb-icon icon="menu-2-outline" pack="eva"></nb-icon>
  </button>

  <a class="brand" routerLink="/cases">
    <span class="brand-mark">FP</span>
    <span class="brand-text">Fraud&nbsp;Prevention</span>
  </a>

  <div class="search">
    <nb-icon icon="search-outline" pack="eva" class="search-icon"></nb-icon>
    <input
      nbInput
      fullWidth
      fieldSize="small"
      type="text"
      placeholder="Search cases, users, rules…"
      [ngModel]="searchQuery()"
      (ngModelChange)="searchQuery.set($event)"
    />
  </div>

  <span class="spacer"></span>

  <button
    nbButton
    ghost
    type="button"
    class="icon-btn"
    (click)="toggleTheme()"
    [attr.aria-label]="isLight() ? 'Switch to dark theme' : 'Switch to light theme'"
    [attr.aria-pressed]="isLight()"
  >
    <nb-icon [icon]="isLight() ? 'moon-outline' : 'sun-outline'" pack="eva"></nb-icon>
  </button>

  <button nbButton ghost type="button" class="icon-btn" aria-label="Notifications">
    <nb-icon icon="bell-outline" pack="eva"></nb-icon>
  </button>

  <div class="user-menu" *ngIf="user() as u">
    <button
      nbButton
      ghost
      type="button"
      class="user-button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-haspopup="menu"
    >
      <span class="user-avatar">{{ initials }}</span>
      <span class="user-info">
        <span class="username">{{ u.username }}</span>
        <span class="role-badge">{{ roleBadge }}</span>
      </span>
      <nb-icon
        class="dropdown-icon"
        [icon]="menuOpen() ? 'chevron-up-outline' : 'chevron-down-outline'"
        pack="eva"
      ></nb-icon>
    </button>

    <div class="user-dropdown glass" *ngIf="menuOpen()" role="menu">
      <div class="dropdown-header">
        <span class="username">{{ u.username }}</span>
        <span class="role-badge">{{ roleBadge }}</span>
      </div>
      <button
        nbButton
        ghost
        status="danger"
        type="button"
        role="menuitem"
        class="dropdown-item"
        (click)="onLogout()"
      >
        <nb-icon icon="log-out-outline" pack="eva"></nb-icon>
        Sign out
      </button>
    </div>
  </div>
</div>
