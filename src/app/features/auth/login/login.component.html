<nb-layout>
  <nb-layout-column class="login-column">
    <nb-card class="login-card" status="primary" accent="info">
      <nb-card-header>
        <h1 class="login-title">Fraud Prevention System</h1>
        <p class="login-subtitle">Analyst Console</p>
      </nb-card-header>

      <nb-card-body>
        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label class="label" for="username">Username</label>
            <input
              nbInput
              fullWidth
              fieldSize="large"
              id="username"
              name="username"
              autocomplete="username"
              placeholder="Username"
              [(ngModel)]="username"
            />
          </div>

          <div class="form-group">
            <label class="label" for="password">Password</label>
            <nb-form-field>
              <input
                nbInput
                fullWidth
                fieldSize="large"
                id="password"
                name="password"
                autocomplete="current-password"
                placeholder="Password"
                [type]="hidePassword ? 'password' : 'text'"
                [(ngModel)]="password"
              />
              <button
                nbSuffix
                nbButton
                ghost
                type="button"
                (click)="hidePassword = !hidePassword"
                [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
              >
                <nb-icon
                  [icon]="hidePassword ? 'eye-outline' : 'eye-off-outline'"
                  pack="eva"
                ></nb-icon>
              </button>
            </nb-form-field>
          </div>

          <p class="error-message" *ngIf="error">{{ error }}</p>

          <button
            nbButton
            fullWidth
            status="primary"
            size="large"
            type="submit"
            [disabled]="loading"
          >
            <span *ngIf="!loading">Sign In</span>
            <span *ngIf="loading">Signing in…</span>
          </button>
        </form>
      </nb-card-body>
    </nb-card>
  </nb-layout-column>
</nb-layout>
