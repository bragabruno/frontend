# Non-root nginx (nginxinc/nginx-unprivileged) serves the Angular SPA on 8080.
# SPA deep links fall back to index.html; static assets are cached aggressively.
server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long-cache fingerprinted build assets.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Angular client-side routing: unknown paths resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
